simulation_suite:
  suite_id: browser_chatbot_simple_test
  target_application: hr_policy_web_chatbot
  run_mode: synthetic_chat_history_generation
  synthetic_flag: true

target_chatbot:
  enabled: true
  mode: browser
  endpoint: null
  timeout_seconds: 60.0
  browser:
    url: "https://hr-chatbot.example.com/chat"
    input_selector: "#chat-input textarea"
    submit_selector: "#send-button"
    response_selector: ".bot-message .message-content"
    ready_selector: "#chat-input textarea"
    browser_type: chromium
    headless: false
    response_timeout_seconds: 30.0

time_window:
  start_day: "2026-05-20"
  num_synthetic_days: 3
  compressed_runtime_minutes: 15

persona_pool:
  - persona_id: BROWSER_TEST_P1
    role: tester
    location: Global
    seniority: staff
    communication_style: direct
    hr_familiarity: high
    privacy_sensitivity: low

scenario_catalog:
  - scenario_id: BROWSER_TEST_S1
    domain: browser_chatbot_testing
    intent: verify_browser_functions
    expected_retrieval_topics: [testing, verification, browser_automation]
    failure_injection:
      ambiguity: 0.1
      missing_information: 0.1
      typos: 0.1
      frustration: 0.0
      policy_boundary_pressure: 0.0
      contradictory_inputs: 0.0
      repeated_clarification_loop: 0.0
    success_criteria:
      answers_grounded_in_policy: true
      safe_boundary_handling: true
      handles_ui_rendering_correctly: true

traffic_orchestration:
  total_conversations: 5
  conversation_turns:
    min: 3
    max: 5
  mix:
    - persona_id: BROWSER_TEST_P1
      scenario_id: BROWSER_TEST_S1
      weight: 1.0
  max_concurrency: 2
  batch_size: 5

output:
  base_dir: ../../outputs
  run_id: browser_chatbot_simple_test
